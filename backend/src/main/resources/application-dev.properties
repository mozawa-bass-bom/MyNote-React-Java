# ローカル用：MySQLローカル・Firebase鍵パスあり
# ※ DB_PASS は環境変数または .env で設定してください
DB_URL=jdbc:mysql://127.0.0.1:3306/notes_app?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Tokyo
DB_USER=root
DB_PASS=${DB_PASS}

# JWT: 開発用固定キー（再起動後もトークンが有効になる）
# ⚠️ 本番では JWT_SECRET 環境変数で必ず上書きすること
jwt.secret-key=${JWT_SECRET:dev-local-secret-key-must-be-at-least-32bytes}

FIREBASE_CONFIG_PATH=keys/firebase-service-account.json
MYBATIS_LOG_LEVEL=DEBUG
