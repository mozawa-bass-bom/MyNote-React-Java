services:
  db:
    image: mysql:8.4
    container_name: mynote-db
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASS}
      MYSQL_DATABASE: notes_app
      MYSQL_USER: user
      MYSQL_PASSWORD: ${DB_PASS}
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./mysql-init:/docker-entrypoint-initdb.d/
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mynote-backend
    ports:
      - "8080:8080"
    environment:
      - DB_URL=jdbc:mysql://db:3306/notes_app?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Tokyo
      - DB_USER=root
      - DB_PASS=${DB_ROOT_PASS}
      - JWT_SECRET=${JWT_SECRET}
      - FIREBASE_CONFIG_PATH=keys/firebase-service-account.json
      - GOOGLE_APPLICATION_CREDENTIALS=/app/keys/gemini-service-account.json
    volumes:
      - ./backend:/app
      - ~/.m2:/root/.m2
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: mynote-frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    command: npm run dev

volumes:
  db_data:
  frontend_node_modules: